  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; overflow: hidden; height: 100vh; }

    /* ── Header ── */
    header {

    .hdr-sep { opacity: .3; margin: 0 7px; }

    /* ── Layout ── */
    .layout { display: flex; height: calc(100vh - 52px); position: relative; overflow: hidden; }

    /* ── Canvas ── */
    .canvas-wrap { flex: 1; position: relative; background: #fafbfc; }
    #cy { width: 100%; height: 100%; }

    /* ── Filter bar ── */
    .filterbar {
      position: absolute; top: 12px; left: 14px;
      display: flex; gap: 6px; flex-wrap: wrap; z-index: 10;
    }
    .chip {
      padding: 4px 13px; border-radius: 20px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 2px solid; transition: opacity .15s, transform .1s;
      user-select: none; white-space: nowrap;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.off { opacity: .3; }
    .chip-clear {
      padding: 4px 13px; border-radius: 20px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 2px solid #9ca3af; color: #6b7280; background: transparent;
      transition: all .15s; display: none;
    }
    .chip-clear.visible { display: inline-block; }
    .chip-clear:hover { border-color: #374151; color: #374151; }

    /* ── Zoom controls ── */
    .controls {
      position: absolute; bottom: 58px; right: 14px;
      display: flex; flex-direction: column; gap: 4px; z-index: 10;
    }
    .ctrl-btn {
      width: 32px; height: 32px; border: 1px solid #e5e7eb; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: #374151; transition: background .12s;
      box-shadow: 0 1px 3px rgba(0,0,0,.08); user-select: none;
    }
    .ctrl-btn:hover { background: #f3f4f6; }

    .legend {

      border-radius: 8px; padding: 10px 14px; font-size: 11px;
      z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .legend-section { margin-bottom: 8px; }
    .legend-section:last-child { margin-bottom: 0; }
    .legend-title {
      font-weight: 700; font-size: 10px; text-transform: uppercase;
      letter-spacing: .08em; color: #9ca3af; margin-bottom: 5px;
    }
    .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; color: #374151; }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { height: 2px; border-radius: 1px; flex-shrink: 0; }
    .legend-line.s1 { width: 20px; background: #d1d5db; }
    .legend-line.s2 { width: 20px; background: #9ca3af; height: 3px; }
    .legend-line.s3 { width: 20px; background: #6b7280; height: 4px; }

    /* ── Status bar ── */
    .statusbar {
      position: absolute; bottom: 8px; right: 14px;
      font-size: 11px; color: #9ca3af; z-index: 10;
    }

    .tooltip {
      position: fixed; background: rgba(26,26,46,.93); color: #fff;
      padding: 8px 12px; border-radius: 7px; font-size: 12px;
      pointer-events: none; opacity: 0; max-width: 240px;

    .sidebar {

      border-left: 1px solid #e5e7eb; display: flex; flex-direction: column;

    .sidebar-body { flex: 1; overflow-y: auto; }

      justify-content: center; flex-shrink: 0;

      text-align: center; line-height: 1;

    .sb-title { font-size: 18px; font-weight: 800; line-height: 1.25; margin-bottom: 3px; color: #1a1a2e; }
    .sb-author { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
    .pillar-badge {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; margin-bottom: 10px;

    .pillar-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
    .tag-pill { padding: 3px 9px; border-radius: 20px; font-size: 11px; background: #f3f4f6; color: #374151; }
    .sb-divider { border: none; border-top: 1px solid #f3f4f6; margin: 14px 0; }
    .sb-section { margin-bottom: 14px; }
    .sb-label {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;

    }

    }
    .bookmark-btn:hover { border-color: #1a1a2e; color: #1a1a2e; }
  </style>
</head>

// Index books by id for quick lookup
const BOOK_MAP = {};
BOOKS.forEach(b => { BOOK_MAP[b.id] = b; });

// Compute short labels (max 20 chars, word-wrappable)
function makeLabel(title) {
  if (title.length <= 18) return title;
  const words = title.split(' ');
  let line = '', result = '';
  for (const w of words) {
    if ((line + ' ' + w).trim().length > 14 && line) {
      result += (result ? '\n' : '') + line.trim();
      line = w;
    } else {
      line = (line + ' ' + w).trim();
    }
  }
  if (line) result += (result ? '\n' : '') + line.trim();
  return result;
}

// Edge width / opacity by strength
function edgeWidth(s)   { return s === 1 ? 1.2 : s === 2 ? 2 : 3.5; }
function edgeOpacity(s) { return s === 1 ? 0.35 : s === 2 ? 0.55 : 0.88; }

const elements = [];

// ── Book nodes ──
BOOKS.forEach(book => {
  const color = PILLAR_COLOR[book.pillar];
  elements.push({
    group: 'nodes',
    data: {
      id: book.id,
      label: makeLabel(book.title),
      title: book.title,
      author: book.author,
      pillar: book.pillar,
      color: color,
      slug: book.slug,
      secondary: book.secondary,
      synopsis: book.synopsis,
      commentary: book.commentary,
      postUrl: book.postUrl,
      externalUrl: book.externalUrl,
      related: book.related
    }
  });
});

// ── Relationship edges ──
EDGES_RAW.forEach((e, i) => {
  const srcBook = BOOK_MAP[e.source];
  const color = PILLAR_COLOR[srcBook.pillar];
  elements.push({
    group: 'edges',
    data: {
      id: 'e' + i,
      source: e.source,
      target: e.target,
      strength: e.strength,
      reason: e.reason,
      color: color,
      width: edgeWidth(e.strength),
      baseOpacity: edgeOpacity(e.strength)
    }
  });
});

const tooltip = document.getElementById('tooltip');

function showNodeTooltip(node, evt) {
  const d = node.data();
  const color = d.color;
  tooltip.innerHTML = `
    <div class="tt-title">${d.title}</div>
    <div class="tt-author">by ${d.author}</div>
    <div class="tt-pillar" style="color:${color}">${d.pillar}</div>
  `;
  positionTooltip(evt);
  tooltip.style.opacity = '1';
}

function showEdgeTooltip(edge, evt) {
  const d = edge.data();
  const srcBook = BOOK_MAP[d.source];
  const tgtBook = BOOK_MAP[d.target];
  const strengthLabel = d.strength === 3 ? 'Strong' : d.strength === 2 ? 'Moderate' : 'Thematic';
  tooltip.innerHTML = `
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.6;margin-bottom:4px">${strengthLabel} Connection</div>
    <div style="font-size:12px;font-weight:600;margin-bottom:2px">${srcBook.title}</div>
    <div style="font-size:11px;opacity:.6;margin-bottom:5px">↔ ${tgtBook.title}</div>
    <div class="tt-reason">${d.reason}</div>
  `;
  positionTooltip(evt);
  tooltip.style.opacity = '1';
}

function positionTooltip(evt) {
  const x = evt.originalEvent.clientX + 15;
  const y = evt.originalEvent.clientY - 10;
  // Keep tooltip within viewport
  const rect = tooltip.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  tooltip.style.left = Math.min(x, vw - 260) + 'px';
  tooltip.style.top  = Math.min(y, vh - 120) + 'px';
}

function hideTooltip() {
  tooltip.style.opacity = '0';
}

cy.on('mouseover', 'node', (e) => showNodeTooltip(e.target, e));
cy.on('mousemove', 'node', (e) => positionTooltip(e));
cy.on('mouseout',  'node', hideTooltip);
cy.on('mouseover', 'edge', (e) => showEdgeTooltip(e.target, e));
cy.on('mousemove', 'edge', (e) => positionTooltip(e));
cy.on('mouseout',  'edge', hideTooltip);

/* ════════════════════════════════════════════════
   SELECTION & HIGHLIGHT
   ════════════════════════════════════════════════ */

function clearHighlight() {
  cy.elements().removeClass('selected neighbor faded');
  selectedNode = null;
}

function highlightNode(node) {
  clearHighlight();
  selectedNode = node;

  const connectedEdges = node.connectedEdges();
  const neighborNodes  = connectedEdges.connectedNodes().not(node);

  cy.elements().addClass('faded');
  node.removeClass('faded').addClass('selected');
  connectedEdges.removeClass('faded').addClass('selected');
  neighborNodes.removeClass('faded').addClass('neighbor');
}

cy.on('tap', 'node', function(e) {
  e.stopPropagation();
  highlightNode(e.target);
  openSidebar(e.target.data());
});

cy.on('tap', function(e) {
  if (e.target === cy) {
    clearHighlight();
    closeSidebar();
  }
});

    const rb = BOOK_MAP[rid];
    return rb
      ? `<button class="related-pill" data-id="${rid}" title="${rb.author}">${rb.title}</button>`
      : '';
  }).join('');

  sbType.textContent = 'BOOK';
  sbType.style.color = color;

  sbBody.innerHTML = `
    <div class="cover-banner" style="background:linear-gradient(150deg,${color}22,${color}44)">
      <div class="cover-book" style="background:${color}">${initials}</div>
    </div>
    <div class="sb-content">
      <div class="sb-title">${d.title}</div>
      <div class="sb-author">by ${d.author}</div>
      <div>
        <span class="pillar-badge" style="background:${color}18;color:${color}">
          <span class="pillar-dot" style="background:${color}"></span>
          ${d.pillar}
        </span>
      </div>
      ${tags ? `<div class="tags-row">${tags}</div>` : ''}
      <hr class="sb-divider">
      <div class="sb-section">
        <div class="sb-label">Synopsis</div>
        <div class="sb-text">${d.synopsis || 'No synopsis available.'}</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Why It Matters — Gambrell Commentary</div>
        <div class="sb-text commentary">${d.commentary || 'Commentary coming soon.'}</div>
      </div>
      ${relatedPills ? `
      <hr class="sb-divider">
      <div class="sb-section">
        <div class="sb-label">Connected Books</div>
        <div class="related-pills">${relatedPills}</div>
      </div>` : ''}
      <hr class="sb-divider">
      <a class="learn-more-btn" href="${d.postUrl}" target="_blank">Learn More →</a>
      <button class="bookmark-btn" id="bm-btn">☆ Add to My Reading List</button>
    </div>
  `;

  sidebar.classList.add('open');

  // Bookmark toggle
  const bmBtn = document.getElementById('bm-btn');
  if (bmBtn) {
    bmBtn.onclick = function() {
      const saved = this.innerHTML.includes('Add');
      this.innerHTML = saved ? '★ Saved to Reading List' : '☆ Add to My Reading List';
    };
  }

  // Related book pills → navigate graph
  sbBody.querySelectorAll('.related-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const rid = btn.dataset.id;
      const target = cy.getElementById(rid);
      if (target.length) {
        cy.animate({ fit: { eles: target, padding: 120 } }, { duration: 500 });
        setTimeout(() => {
          highlightNode(target);
          openSidebar(target.data());
        }, 520);
      }
    });
  });
}

function closeSidebar() {
  sidebar.classList.remove('open');
}

sbClose.addEventListener('click', () => {
  closeSidebar();
  clearHighlight();
});

/* ════════════════════════════════════════════════
   PILLAR FILTERS
   ════════════════════════════════════════════════ */

function applyFilters() {
  if (activeFilters.size === 0) {
    cy.nodes().forEach(n => n.style('opacity', 1));
    cy.edges().forEach(e => e.style('opacity', e.data('baseOpacity')));
    return;
  }

  cy.nodes().forEach(n => {
    const inFilter = activeFilters.has(n.data('pillar'));
    n.style('opacity', inFilter ? 1 : 0.06);
  });

  cy.edges().forEach(e => {
    const src = cy.getElementById(e.data('source'));
    const tgt = cy.getElementById(e.data('target'));
    const srcIn = activeFilters.has(src.data('pillar'));
    const tgtIn = activeFilters.has(tgt.data('pillar'));
    e.style('opacity', (srcIn || tgtIn) ? e.data('baseOpacity') : 0.03);
  });
}

const filterbar = document.getElementById('filterbar');

// Clear button
const clearBtn = document.createElement('button');
clearBtn.className = 'chip-clear';
clearBtn.textContent = '× Clear';
clearBtn.addEventListener('click', () => {
  activeFilters.clear();
  filterbar.querySelectorAll('.chip').forEach(c => c.classList.add('off'));
  clearBtn.classList.remove('visible');
  applyFilters();
  if (selectedNode) highlightNode(selectedNode);
});
filterbar.appendChild(clearBtn);

PILLARS.forEach(p => {
  const chip = document.createElement('div');
  chip.className = 'chip off';
  chip.style.cssText = `background:${p.color}18;border-color:${p.color};color:${p.color}`;
  chip.textContent = p.label;
  chip.title = `Show only ${p.label} books`;

  chip.addEventListener('click', () => {
    if (activeFilters.has(p.label)) {
      activeFilters.delete(p.label);
      chip.classList.add('off');
    } else {
      activeFilters.add(p.label);
      chip.classList.remove('off');
    }
    clearBtn.classList.toggle('visible', activeFilters.size > 0);
    applyFilters();
  });

  filterbar.appendChild(chip);
});

/* ════════════════════════════════════════════════
   LEGEND
   ════════════════════════════════════════════════ */

const legend = document.getElementById('legend');
legend.innerHTML = `
  <div class="legend-section">
    <div class="legend-title">Pillars</div>
    ${PILLARS.map(p => `
      <div class="legend-row">
        <div class="legend-dot" style="background:${p.color}"></div>
        <span>${p.label}</span>
      </div>
    `).join('')}
  </div>
  <div class="legend-section">
    <div class="legend-title">Connection Strength</div>
    <div class="legend-row"><div class="legend-line s1"></div><span>Thematic</span></div>
    <div class="legend-row"><div class="legend-line s2"></div><span>Moderate</span></div>
    <div class="legend-row"><div class="legend-line s3"></div><span>Strong</span></div>
  </div>
`;

/* ════════════════════════════════════════════════
   STATUS BAR
   ════════════════════════════════════════════════ */

document.getElementById('statusbar').textContent =
  `${BOOKS.length} books · ${EDGES_RAW.length} connections`;

/* ════════════════════════════════════════════════
   ZOOM CONTROLS
   ════════════════════════════════════════════════ */

document.getElementById('btn-fit').addEventListener('click', () => {
  cy.animate({ fit: { padding: 50 } }, { duration: 500 });
});
document.getElementById('btn-zin').addEventListener('click', () => {
  cy.animate({ zoom: { level: cy.zoom() * 1.3, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } } }, { duration: 250 });
});
document.getElementById('btn-zout').addEventListener('click', () => {
  cy.animate({ zoom: { level: cy.zoom() * 0.77, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } } }, { duration: 250 });
});

/* ════════════════════════════════════════════════
   RESIZE
   ════════════════════════════════════════════════ */

window.addEventListener('resize', () => cy.resize());
</script>
