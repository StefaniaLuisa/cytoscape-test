ons.</p></div></div><div class="canvas-wrap" id="wrap"><div class="filterbar" id="filterbar"></div><svg id="g"></svg><div class="legend" id="legend"></div><div class="statusbar" id="status"></div><div class="tooltip" id="tip"></div><div class="book-overlay" id="bookOverlay"><div class="overlay-header"><span class="overlay-type" id="overlayType">BOOK</span><button class="overlay-close" id="overlayClose">&times;</button></div><div class="overlay-body" id="overlayBody"></div></div></div></div><script>var CATS=[{id:"c-belonging",label:"Belonging",col:"#7c3aed"},{id:"c-relationship",label:"Relationship",col:"#db2777"},{id:"c-awe",label:"Awe & Wonder",col:"#0284c7"},{id:"c-purpose",label:"Purpose & Meaning",col:"#b45309"},{id:"c-luck",label:"Luck & Randomness",col:"#16a34a"},{id:"c-philosophy",label:"Philosophy & Spirituality",col:"#7e22ce"}];var BOOKS=[{id:"b1",title:"Sapiens",author:"Yuval Noah Harari",cat:"c-purpose",tags:["Non-fiction","Philosophy"],synopsis:"A brief history of humankind tracing the cognitive, agricultural, and scientific revolutions that shaped our world.",commentary:"Essential context for understanding why humans cooperate, lead, and build institutions as they do."},{id:"b2",title:"Man's Search for Meaning",author:"Viktor Frankl",cat:"c-purpose",tags:["Philosophy","Spirituality"],synopsis:"A psychiatrist's account of survival in Nazi concentration camps and the development of logotherapy.",commentary:"Frankl shows that meaning — not happiness — is what sustains us. One of the most profound books on resilience."},{id:"b3",title:"Belonging",author:"Owen Eastwood",cat:"c-belonging",tags:["Non-fiction"],synopsis:"A leadership coach reveals how successful teams are built on shared identity and deep belonging.",commentary:"Belonging isn't a soft idea — it's a performance driver. Eastwood makes the case with extraordinary clarity."},{id:"b4",title:"Braiding Sweetgrass",author:"Robin Wall Kimmerer",cat:"c-awe",tags:["Spirituality","Non-fiction"],synopsis:"A botanist weaves plant science with indigenous wisdom about reciprocity with the natural world.",commentary:"A rare book that genuinely changes how you see the world. Science and spirit, beautifully braided."},{id:"b5",title:"Think Again",author:"Adam Grant",cat:"c-purpose",tags:["Non-fiction"],synopsis:"An organizational psychologist makes the case for the joy of being wrong and knowing what you don't know.",commentary:"Intellectual humility is a superpower. Grant makes rethinking feel exciting rather than threatening."},{id:"b6",title:"The Good Life",author:"Waldinger & Schulz",cat:"c-relationship",tags:["Non-fiction"],synopsis:"Lessons from the longest scientific study of happiness: good relationships are the key to flourishing.",commentary:"The science is clear: relationships matter more than wealth or fame. 85 years of data prove it."},{id:"b7",title:"Born to be Good",author:"Dacher Keltner",cat:"c-awe",tags:["Spirituality","Non-fiction"],synopsis:"A psychologist argues humans are wired for kindness and that awe, compassion, and gratitude are our natural state.",commentary:"A hopeful counterpoint to cynicism. Keltner shows goodness isn't naive — it's evolutionary."},{id:"b8",title:"Fooled by Randomness",author:"Nassim Taleb",cat:"c-luck",tags:["Non-fiction","Philosophy"],synopsis:"The hidden role of chance in life and markets, and why we systematically underestimate randomness.",commentary:"Humbling and liberating. Taleb challenges us to make peace with uncertainty."},{id:"b9",title:"Meditations",author:"Marcus Aurelius",cat:"c-philosophy",tags:["Philosophy","Wisdom Traditions"],synopsis:"The private journal of a Roman emperor — reflections on Stoic philosophy and how to live with virtue.",commentary:"Written 2,000 years ago and still completely relevant. A daily practice in itself."},{id:"b10",title:"Alive",author:"Piers Paul Read",cat:"c-belonging",tags:["Non-fiction","Book Club"],synopsis:"A rugby team survived a plane crash in the Andes through extraordinary human solidarity.",commentary:"A stunning meditation on what humans will do for each other when everything else is stripped away."},{id:"b11",title:"Of Boys and Men",author:"Richard Reeves",cat:"c-relationship",tags:["Non-fiction","Philanthropy"],synopsis:"A data-driven examination of struggles facing boys and men in modern society.",commentary:"A generous book that invites us to expand our circle of concern rather than assign blame."},{id:"b12",title:"Give and Take",author:"Adam Grant",cat:"c-relationship",tags:["Non-fiction","Philanthropy"],synopsis:"Why givers succeed and why the most generous people often rise to the top in any field.",commentary:"Grant reframes generosity not as sacrifice but as strategy. Essential for anyone in philanthropy."},{id:"b13",title:"Outliers",author:"Malcolm Gladwell",cat:"c-luck",tags:["Non-fiction"],synopsis:"An examination showing that context and luck matter as much as individual merit in success.",commentary:"Gladwell dismantles the myth of the purely self-made and invites us to think about the conditions we create."},{id:"b14",title:"How Minds Change",author:"David McRaney",cat:"c-awe",tags:["Non-fiction","Philosophy"],synopsis:"The science and stories of why people change their minds and how to help them do so.",commentary:"Fascinating and practically useful. McRaney helps us understand persuasion without manipulation."},{id:"b15",title:"Utopia for Realists",author:"Rutger Bregman",cat:"c-purpose",tags:["Non-fiction","Philanthropy"],synopsis:"A bold argument for radical ideas like universal basic income, backed by evidence.",commentary:"Bregman makes big ideas feel achievable. A necessary jolt of optimism about what's possible."},{id:"b16",title:"Moral Ambition",author:"Rutger Bregman",cat:"c-purpose",tags:["Non-fiction","Sally's Pick"],synopsis:"A call to the brightest minds to stop optimizing for personal success and start solving the world's hardest problems.",commentary:"Sally's top pick. The book she wishes every talented young person would read before choosing their career."},{id:"b17",title:"Super Agers",author:"Claudia Hammond",cat:"c-awe",tags:["Non-fiction"],synopsis:"What the world's healthiest older people have in common and what the rest of us can learn.",commentary:"Inspiring and evidence-based. A reminder that aging well is largely within our own hands."},{id:"b18",title:"Mindset",author:"Carol Dweck",cat:"c-purpose",tags:["Non-fiction","Core/Essentials"],synopsis:"How our beliefs about our abilities — fixed or growth — shape every area of our lives.",commentary:"A foundational read. Dweck's framework is one of the most useful mental models we've encountered."},{id:"b19",title:"Diary of a CEO",author:"Steven Bartlett",cat:"c-purpose",tags:["Non-fiction","Sally's Pick"],synopsis:"33 rules for building a life and business, drawn from candid conversations with world-class leaders.",commentary:"Raw, honest, and surprisingly vulnerable. Bartlett's rules are practical and worth revisiting often."},{id:"b20",title:"How to Study Public Life",author:"Gehl & Svarre",cat:"c-belonging",tags:["Non-fiction"],synopsis:"A guide to how people use public spaces and how design can foster community and belonging.",commentary:"A quiet classic. Belonging isn't just personal — it's designed into the places we inhabit."},{id:"b21",title:"Billions & Billions Served",author:"David Bornstein",cat:"c-purpose",tags:["Non-fiction","Philanthropy"],synopsis:"Social entrepreneurs solving humanity's biggest problems with creativity and persistence.",commentary:"Proof that ordinary people can change systems. Deeply motivating for anyone in the social sector."},{id:"b22",title:"The Life of Dad",author:"Anna Machin",cat:"c-relationship",tags:["Non-fiction"],synopsis:"The unique biology and psychology of fatherhood explored across cultures and history.",commentary:"Fatherhood is underresearched and undervalued. Machin corrects that beautifully."}];var TAGS_LIST=["Philosophy","Spirituality","Fiction","Non-fi
